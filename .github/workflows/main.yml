name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      # ── Use Case 5: No API calls, runs on every push ────────
      - name: Enforce agent scaffolding
        run: pytest tests/test_scaffold.py -v

      # ── Use Case 4: Validate secrets before API tests ───────
      - name: Validate environment secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/test_env.py -v

      # ── Use Case 1: Regression (per-agent, no triage) ───────
      - name: Run regression tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/test_regression.py -v

      # ── Use Case 3: Smoke (triage end-to-end) ───────────────
      - name: Run smoke tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/test_smoke.py -v

